  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:       #060e1a;
      --gold:      #b8963e;
      --gold-light:#d4a853;
      --white:     #ffffff;
      --cream:     #f7f4ef;
      --ink-soft:  #6b7c93;
      --sans: 'DM Sans', sans-serif;
      --serif: 'Cormorant Garamond', Georgia, serif;
    }
    html, body {
      min-height: 100vh;
      background: var(--ink);
      color: var(--white);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
    }
    /* NAV */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .nav-logo-img { height: 36px; width: auto; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }
    .ty-card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .ty-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(184,150,62,0.12);
      border: 1px solid rgba(184,150,62,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .ty-icon svg { display: block; }
    .ty-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .ty-heading {
      font-family: var(--serif);
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 500;
      line-height: 1.15;
      color: var(--white);
      margin-bottom: 20px;
    }
    .ty-heading em { font-style: italic; color: var(--gold-light); }
    .ty-body {
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.70);
      margin-bottom: 32px;
    }
    .ty-phone {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--white);
      text-decoration: none;
      margin-bottom: 40px;
      transition: background 0.2s, border-color 0.2s;
    }
    .ty-phone:hover {
      background: rgba(184,150,62,0.12);
      border-color: rgba(184,150,62,0.40);
    }
    .ty-phone svg { color: var(--gold); }
    .ty-divider {
      width: 48px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 0 auto 32px;
    }
    .ty-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--gold);
      color: var(--ink);
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.2s;
    }
    .ty-back:hover { background: var(--gold-light); transform: translateY(-1px); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.30);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    footer a { color: rgba(255,255,255,0.45); text-decoration: none; }
  </style>
